[build]
  publish = "."
  command = """printf 'var CONFIG = { emailjs: { publicKey: "%s", serviceId: "%s", contactTemplateId: "%s", reviewTemplateId: "%s" } };\n' \
    "$EMAILJS_PUBLIC_KEY" \
    "$EMAILJS_SERVICE_ID" \
    "$EMAILJS_CONTACT_TEMPLATE_ID" \
    "$EMAILJS_REVIEW_TEMPLATE_ID" > config.js"""
